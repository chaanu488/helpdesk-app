apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpdesk
  namespace: helpdesk
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - helpdesk.local
      secretName: helpdesk-tls
  rules:
    - host: helpdesk.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: helpdesk-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helpdesk-frontend
                port:
                  number: 3000
