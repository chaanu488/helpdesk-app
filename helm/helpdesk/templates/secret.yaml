{{/*
secret.yaml — จัดการ secret สองโหมด:
  1. externalSecret.enabled: false (default/dev)
     → สร้าง K8s Secret จากค่าใน values.yaml โดยตรง
  2. externalSecret.enabled: true (production)
     → ไม่สร้าง Secret ตรงนี้ (ESO จะสร้างให้ผ่าน external-secret.yaml)
*/}}
{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: helpdesk-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}
