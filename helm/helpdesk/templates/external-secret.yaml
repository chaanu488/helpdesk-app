{{/*
external-secret.yaml — ใช้เมื่อ externalSecret.enabled: true
External Secrets Operator จะดึง secret จาก provider (AWS SM, Vault, GCP SM ฯลฯ)
แล้วสร้าง K8s Secret ชื่อ helpdesk-secrets ให้อัตโนมัติ

ต้องติดตั้ง ESO ก่อน:
  helm repo add external-secrets https://charts.external-secrets.io
  helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: helpdesk-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: helpdesk-secrets          # ชื่อ K8s Secret ที่จะถูกสร้าง
    creationPolicy: Owner           # ESO เป็น owner — ลบ ExternalSecret = ลบ Secret ด้วย
  data:
    - secretKey: database-url       # key ใน K8s Secret
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefs.databaseUrl.key | quote }}
        property: {{ .Values.externalSecret.remoteRefs.databaseUrl.property | quote }}
    - secretKey: redis-url
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefs.redisUrl.key | quote }}
        property: {{ .Values.externalSecret.remoteRefs.redisUrl.property | quote }}
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefs.jwtSecret.key | quote }}
        property: {{ .Values.externalSecret.remoteRefs.jwtSecret.property | quote }}
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefs.postgresPassword.key | quote }}
        property: {{ .Values.externalSecret.remoteRefs.postgresPassword.property | quote }}
{{- end }}
