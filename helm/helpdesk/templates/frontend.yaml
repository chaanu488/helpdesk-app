apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helpdesk-frontend
  template:
    metadata:
      labels:
        app: helpdesk-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"
          imagePullPolicy: {{ .Values.frontend.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: helpdesk-config
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: helpdesk-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "helpdesk.labels" . | nindent 4 }}
spec:
  selector:
    app: helpdesk-frontend
  ports:
    - port: 3000
      targetPort: 3000
