# cluster-secret-store-vault.yaml
# ตัวอย่าง ClusterSecretStore สำหรับ HashiCorp Vault
# apply ครั้งเดียวต่อ cluster (ไม่ผ่าน ArgoCD ก็ได้)
#
# ต้องการก่อน:
#   1. ติดตั้ง External Secrets Operator ใน cluster
#   2. Vault ต้องเปิด Kubernetes auth method:
#      vault auth enable kubernetes
#      vault write auth/kubernetes/config \
#        kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443"
#   3. สร้าง policy และ role ใน Vault:
#      vault policy write helpdesk-read - <<EOF
#        path "secret/data/prod/helpdesk" { capabilities = ["read"] }
#      EOF
#      vault write auth/kubernetes/role/helpdesk \
#        bound_service_account_names=external-secrets \
#        bound_service_account_namespaces=external-secrets \
#        policies=helpdesk-read ttl=1h
#
# --- วิธีสร้าง secret ใน Vault ---
# vault kv put secret/prod/helpdesk \
#   DATABASE_URL="postgres://..." \
#   REDIS_URL="redis://..." \
#   JWT_SECRET="..."
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cluster-secret-store
spec:
  provider:
    vault:
      server: "https://vault.yourdomain.com"   # Vault endpoint
      path: "secret"                            # KV mount path
      version: "v2"                             # KV v2
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "helpdesk"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
