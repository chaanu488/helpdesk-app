# cluster-secret-store-aws.yaml
# ตัวอย่าง ClusterSecretStore สำหรับ AWS Secrets Manager
# apply ครั้งเดียวต่อ cluster (ไม่ผ่าน ArgoCD ก็ได้)
#
# ต้องการก่อน:
#   1. ติดตั้ง External Secrets Operator ใน cluster
#   2. สร้าง IAM Role / IRSA ที่มีสิทธิ์อ่าน secretsmanager:GetSecretValue
#   3. สร้าง K8s Secret ชื่อ aws-credentials (ถ้าไม่ใช้ IRSA)
#
# --- วิธีสร้าง secret ใน AWS SM ---
# aws secretsmanager create-secret --name "prod/helpdesk" \
#   --secret-string '{"DATABASE_URL":"postgres://...","REDIS_URL":"redis://...","JWT_SECRET":"..."}'
#
# วิธีใช้ IRSA (แนะนำ — ไม่ต้องสร้าง aws-credentials secret):
#   ใส่ serviceAccountName: external-secrets ที่มี annotation eks.amazonaws.com/role-arn
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: cluster-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1     # เปลี่ยนเป็น region ของคุณ
      auth:
        # Option A: ใช้ IRSA (แนะนำสำหรับ EKS)
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
        # Option B: ใช้ access key (ไม่แนะนำ ใช้แค่ test)
        # secretRef:
        #   accessKeyIDSecretRef:
        #     name: aws-credentials
        #     namespace: external-secrets
        #     key: access-key-id
        #   secretAccessKeySecretRef:
        #     name: aws-credentials
        #     namespace: external-secrets
        #     key: secret-access-key
